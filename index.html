<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Player ❤︎</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>
  <div class="app">
    
    <aside class="sidebar">
      <h1 class="logo">❤︎ KIM ❤︎</h1>
      <nav>
        <p onclick="navigate('playlist')">PLAYLIST</p>
        <p onclick="navigate('albums')">ALBUMS</p>
        <p onclick="navigate('songs')">ALL SONGS</p>
      </nav>
    </aside>

    <main class="main">

      <button id="backBtn" onclick="goBackToAlbums()">← Back</button>

      <div class="header">
        <div class="album">
          <img id="cover" src="images/melody.jpg">
        </div>

        <div class="info">
          <h1 id="artist">ARTIST</h1>
          <p id="albumInfo">No album selected</p>
          <button onclick="playPause()">▶ Play</button>
        </div>
      </div>

      <div id="albumsPage">

  <div id="createAlbumSection">
    <input type="text" id="albumName" placeholder="Album name">
    <input type="text" id="albumCover" placeholder="Image URL">
    <button onclick="createAlbum()">Create Album</button>
  </div>

  <div id="albumsView" class="albums"></div>

</div>

      <div class="table">
        <div class="row header-row">
          <span>#</span>
          <span>Title</span>
          <span>Time</span>
        </div>
        <div id="songs"></div>
      </div>

      <div class="add-btn" id="addBtn" onclick="openModal()">＋</div>

    </main>
  </div>

  <div class="player">
    
    <div class="now">
    <img id="miniCover" src="images/melody.jpg">
    <div class="meta">
    <p id="title">Song Title</p>
    <p id="artistName">Artist</p>
  </div>
</div>

    <div class="middle">
      <div class="controls">
        <button onclick="prev()">⏮</button>
        <button onclick="playPause()" id="playBtn">▶</button>
        <button onclick="next()">⏭</button>
      </div>

      <div class="progress-container">
        <span id="currentTime">0:00</span>
        <input type="range" id="progress" value="0">
        <span id="duration">0:00</span>
    </div>
    </div>

    <audio id="audio"></audio>
  </div>

    <div id="modal" class="modal">
    <div class="modal-content">
    <h3 style="color:black">Add Song</h3>

    <input type="text" id="songTitle" placeholder="Song title">
    <input type="text" id="songFile" placeholder="Music URL (.mp3)">

    <div class="modal-actions">
      <button style="color:black" onclick="addSong(); closeModal()">Add</button>
      <button style="color:black" onclick="closeModal()" class="cancel">Cancel</button>
    </div>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
